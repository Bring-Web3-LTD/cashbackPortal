<svg xmlns="http://www.w3.org/2000/svg" width="82" height="82" viewBox="0 0 82 82" fill="none">
  <!-- Clock face -->
  <circle cx="41" cy="41" r="27" fill="#67E8F9" fill-opacity="0.12"/>
  <circle cx="41" cy="41" r="27" stroke="#67E8F9" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Hour markers at 12, 3, 6, 9 -->
  <line x1="41" y1="16" x2="41" y2="20" stroke="#67E8F9" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="41" y1="62" x2="41" y2="66" stroke="#67E8F9" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="16" y1="41" x2="20" y2="41" stroke="#67E8F9" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="62" y1="41" x2="66" y2="41" stroke="#67E8F9" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Hour hand (pointing ~10 o'clock) -->
  <path d="M41 41L30 24" stroke="#67E8F9" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2 o'clock) -->
  <path d="M41 41L55 30" stroke="#67E8F9" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8"/>

  <!-- Center cap -->
  <circle cx="41" cy="41" r="3.5" fill="#67E8F9"/>
</svg>
