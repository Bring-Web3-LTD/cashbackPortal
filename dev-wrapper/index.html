<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <title>Cashback Portal - dev wrapper</title>
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <header class="bar">
            <div class="bar-text">
                <h1>Cashback Portal: dev wrapper</h1>
                <p class="hint">
                    Simulates a partner page embedding the portal via the
                    <code>POST /v1/extension/check/portal</code> bootstrap call.
                </p>
            </div>
            <button id="walletBtn" type="button" class="wallet-btn" data-state="disconnected">
                Connect wallet
            </button>
            <button id="logoutBtn" type="button" class="logout-btn" title="Clear CloudFront basic-auth credentials" hidden>
                Log out
            </button>
        </header>

        <main class="layout" id="layout">
            <button id="toggleSidebar" class="toggle" type="button" aria-label="Toggle sidebar" title="Toggle sidebar">
                <span class="toggle-icon" aria-hidden="true">‹</span>
            </button>
            <aside class="controls">
                <p class="api-info">API path: <code id="apiStageInfo">—</code></p>

                <fieldset>
                    <legend>Inputs</legend>

                    <label>
                        <span>Theme</span>
                        <select id="theme">
                            <option value="">(unset)</option>
                            <option value="light">light</option>
                            <option value="dark">dark</option>
                        </select>
                    </label>

                    <label>
                        <span>Wallet address</span>
                        <input id="wallet" type="text" placeholder="0x… (leave empty for null)" />
                    </label>

                    <label>
                        <span>Extension ID</span>
                        <input id="extensionId" type="text" />
                    </label>

                    <button id="refresh" type="button">Refresh</button>
                </fieldset>

                <fieldset>
                    <legend>Mock wallet SDK</legend>
                    <label>
                        <span>Wallet provider</span>
                        <select id="walletProvider">
                            <option value="mock">Mock (in-page)</option>
                            <option value="nightly">Nightly (Solana)</option>
                            <option value="solflare">Solflare (USDC)</option>
                            <option value="yoroi">Yoroi (Cardano)</option>
                            <option value="casper">Casper Wallet (CSPR)</option>
                            <option value="ecko">Ecko (Kadena, connect only)</option>
                            <option value="ready">Ready / Argent (Starknet, connect only)</option>
                        </select>
                    </label>
                    <label class="row">
                        <input id="startConnected" type="checkbox" />
                        <span>Start connected</span>
                    </label>
                    <div class="btn-row">
                        <button id="manualConnect" type="button" class="secondary">Send connect</button>
                        <button id="manualAbort" type="button" class="secondary">Abort sign</button>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Event log</legend>
                    <div id="log" class="log"></div>
                    <button id="clearLog" type="button" class="secondary">Clear</button>
                </fieldset>

                <details class="debug">
                    <summary>Last API response</summary>
                    <label>
                        <span>portalUrl</span>
                        <textarea id="lastUrl" rows="3" readonly></textarea>
                    </label>
                    <label>
                        <span>raw token</span>
                        <textarea id="lastTokenRaw" rows="3" readonly></textarea>
                    </label>
                </details>

                <details class="debug">
                    <summary>Decoded JWT</summary>
                    <div id="lastTokenDecoded" class="jwt-decoded">
                        <p class="hint">No token yet.</p>
                    </div>
                </details>
                <p id="status" class="status"></p>
            </aside>

            <section class="frame">
                <iframe id="portal" title="Bring Cashback Portal"></iframe>
            </section>
        </main>

        <script type="module" src="./main.ts"></script>
    </body>
</html>
